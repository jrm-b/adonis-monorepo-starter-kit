services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres_api
    volumes:
      - postgres_api_data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

volumes:
  postgres_api_data:
